name: Build FireworkCommand JAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Extract ZIP
      run: unzip -o FireworkCommand-source.zip

    - name: Build with Maven
      run: |
        cd firework-plugin
        mvn clean package

    - name: Upload JAR as Artifact
      - name: Upload JAR as Artifact
  uses: actions/upload-artifact@v4
  with:
    name: firework-plugin-jar
    path: firework-plugin/target/*.jar
      with:
        name: firework-plugin-jar
        path: firework-plugin/target/*.jar
